spring:
  application:
    name: billiard-management

  #KEYCLOAK
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/billiard-management


  #DATABASE
  datasource:
    url: jdbc:postgresql://localhost:5432/billiard_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  #HIBERNATE
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect


##SERVER
server:
  port: 9090

forecast-client:
  base-url: http://localhost:8000/api/v1


keycloak:
  realm: billiard-management
  client-id: mobile-client
  auth-server-url: http://localhost:8080

