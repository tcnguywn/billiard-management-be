openapi: 3.0.0
info:
  title: Pricelist API
  description: API for managing price lists for billiard tables
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/v1/pricelists:
    post:
      summary: Create Price List
      description: Create a new price list entry for a table type
      operationId: createPriceList
      tags:
        - Pricelist
      requestBody:
        description: Price list details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PricelistReq'
      responses:
        '200':
          description: Price list created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePricelist'
        '400':
          description: Invalid request
        '500':
          description: Internal server error

    put:
      summary: Update Price List
      description: Update an existing price list
      operationId: updatePriceList
      tags:
        - Pricelist
      requestBody:
        description: Price list update details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePricelistReq'
      responses:
        '200':
          description: Price list updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePricelist'
        '400':
          description: Invalid request
        '404':
          description: Price list not found

    get:
      summary: Get All Price Lists
      description: Retrieve all price lists
      operationId: getAllPriceLists
      tags:
        - Pricelist
      responses:
        '200':
          description: Price lists retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePricelistList'
        '500':
          description: Internal server error

    delete:
      summary: Delete Price List
      description: Delete a price list by ID
      operationId: deletePriceList
      tags:
        - Pricelist
      parameters:
        - name: priceListId
          in: query
          required: true
          schema:
            type: integer
          description: Price List ID
      responses:
        '200':
          description: Price list deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessage'
        '404':
          description: Price list not found

  /api/v1/pricelists/{id}:
    get:
      summary: Get Price List by ID
      description: Retrieve a specific price list by ID
      operationId: getPriceListById
      tags:
        - Pricelist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Price List ID
      responses:
        '200':
          description: Price list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePricelist'
        '404':
          description: Price list not found
        '500':
          description: Internal server error

components:
  schemas:
    PricelistReq:
      type: object
      properties:
        startTime:
          type: string
          format: time
          description: Start time of applicable period (LocalTime, e.g. HH:mm:ss)
          example: '08:00:00'
        endTime:
          type: string
          format: time
          description: End time of applicable period (LocalTime, e.g. HH:mm:ss)
          example: '17:00:00'
        unitPrice:
          type: number
          format: double
          description: Price per hour
          example: 50000.00
        tableType:
          type: string
          enum: [POOL, SNOOKER, CAROM]
          example: POOL

    UpdatePricelistReq:
      type: object
      properties:
        id:
          type: integer
          example: 1
        startTime:
          type: string
          format: time
          example: '08:00:00'
        endTime:
          type: string
          format: time
          example: '17:00:00'
        unitPrice:
          type: number
          format: double
          example: 50000.00
        tableType:
          type: string
          enum: [POOL, SNOOKER, CAROM]
          example: POOL

    PricelistRes:
      type: object
      properties:
        id:
          type: integer
          example: 1
        startTime:
          type: string
          format: time
          example: '08:00:00'
        endTime:
          type: string
          format: time
          example: '17:00:00'
        unitPrice:
          type: number
          format: double
          example: 50000.00
        tableType:
          type: string
          enum: [POOL, SNOOKER, CAROM]
          example: POOL

    ApiResponsePricelist:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Create price list success
        body:
          $ref: '#/components/schemas/PricelistRes'

    ApiResponsePricelistList:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Get price lists success
        body:
          type: array
          items:
            $ref: '#/components/schemas/PricelistRes'

    ApiResponseMessage:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Delete price list success
